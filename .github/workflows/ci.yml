name: Node compatibility

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Full validation on Node 20
            node-version: 20
            command: pnpm check && pnpm test && pnpm publish:packages -- --dry-run
          - name: Full validation on Node 22
            node-version: 22
            command: pnpm check && pnpm test && pnpm publish:packages -- --dry-run
          - name: Full validation on Node 24
            node-version: 24
            command: pnpm check && pnpm test && pnpm publish:packages -- --dry-run

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run compatibility validation
        run: ${{ matrix.command }}
