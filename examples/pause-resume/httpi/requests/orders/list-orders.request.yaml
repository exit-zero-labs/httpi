# yaml-language-server: $schema=https://raw.githubusercontent.com/exit-zero-labs/httpi/main/packages/contracts/schemas/request.schema.json
kind: request
title: List orders
method: GET
url: "{{baseUrl}}/orders"
uses:
  headers:
    - common/json
  auth: common/bearer
expect:
  status: 200
extract:
  firstOrderId:
    from: $.orders[0].id
    required: true
